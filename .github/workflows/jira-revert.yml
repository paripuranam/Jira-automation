name: Revert Test Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "paripuranam"
          git config user.email "paripuranam333@gmail.com"

      - name: Revert Last Commit
        run: |
          git revert HEAD --no-edit

      - name: Add Skip CI
        run: |
          git commit --amend -m "Rollback from Jira [skip ci]"

      - name: Push Changes
        run: |
          git push origin ${{ github.event.inputs.branch }}
